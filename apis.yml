aid: pact
name: Pact
description: >-
  Pact is an open source contract testing framework that verifies API
  consumer-provider interactions with support for Ruby, Java, .NET,
  JavaScript, Go, and Python. Pact Broker provides a hypermedia-driven HAL
  API for storing, retrieving, and verifying contracts between services.
